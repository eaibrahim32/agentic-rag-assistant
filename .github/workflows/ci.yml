name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff \
            langgraph==0.2.62 langchain-core==0.3.29 \
            langchain-text-splitters==0.3.5 python-dotenv==1.0.1 httpx==0.27.2

      - name: Lint
        run: ruff check app tests

      - name: Test
        # The suite runs entirely on fakes: no Ollama, no API key, no model download.
        run: pytest -q --cov=app --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t agentic-rag:${{ github.sha }} .
